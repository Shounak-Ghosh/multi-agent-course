# fly.toml app configuration file generated for subuddhi-live-translate-ai on 2026-07-15T11:13:09-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'subuddhi-live-translate-ai'
primary_region = 'sjc'

[build]

[env]
  PORT = "8000"
  MODEL = "gpt-4o-mini"
  TRANSLATION_DB_PATH = "/data/translations.db"

[http_service]
  internal_port = 8000
  force_https = false
  auto_start_machines = true
  auto_stop_machines = 'stop'
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[mounts]
  source = "translate_data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

