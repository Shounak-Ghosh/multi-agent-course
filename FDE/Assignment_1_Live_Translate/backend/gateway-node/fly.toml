# fly.toml app configuration file generated for subuddhi-live-translate-gateway on 2026-07-15T11:42:55-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'subuddhi-live-translate-gateway'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = "8787"
  AI_SERVICE_URL = "http://subuddhi-live-translate-ai.flycast"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1